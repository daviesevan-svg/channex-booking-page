# Fly.io config for the Google ARI egress proxy.
#
# Pinned to ONE region so there is a single static egress IP to whitelist in
# Google Hotel Center (egress IPs are per-region). Always-on so the IP stays
# allocated and the proxy is reachable.
app = "roompanda-ari-proxy"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "get"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
